# Railway build config for apps/api (NestJS)
#
# IMPORTANT: In the Railway UI, set the service root directory to the REPO ROOT (/),
# then add this environment variable to the Railway service:
#   NIXPACKS_CONFIG_FILE=apps/api/nixpacks.toml
#
# This ensures pnpm install has access to the monorepo lockfile and all workspace packages.

[phases.setup]
nixPkgs = ['nodejs_20']

[phases.install]
cmds = ['npm install -g pnpm@9', 'pnpm install --frozen-lockfile']

[phases.build]
cmds = ['pnpm --filter=db db:generate', 'pnpm --filter=api build']

[start]
cmd = 'node apps/api/dist/main'
